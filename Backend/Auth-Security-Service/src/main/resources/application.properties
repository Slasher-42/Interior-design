spring.application.name=Auth-Security-Service
server.port=${SERVER_PORT:8081}

# Datasource (PostgreSQL - own isolated DB for this service)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_security_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# JWT
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24h}
app.jwt.mfa-challenge-expiration-ms=${JWT_MFA_CHALLENGE_EXPIRATION_MS:300000}

# Default super admin, seeded on first startup if no ADMIN exists yet
app.admin.default-email=${DEFAULT_ADMIN_EMAIL:admin@idsms.local}
app.admin.default-password=${DEFAULT_ADMIN_PASSWORD:ChangeMe123!}

# Scheduled DB backup job
app.backup.cron=${BACKUP_CRON:0 0 2 * * *}
app.backup.dir=${BACKUP_DIR:./backups}

management.endpoints.web.exposure.include=health,info
