spring.application.name=Project-Task-Service
server.port=${SERVER_PORT:8084}

# Datasource (PostgreSQL - own isolated DB for this service)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/project_task_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=project-task-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# JWT - must use the same secret as Auth-Security-Service so tokens issued there validate here
