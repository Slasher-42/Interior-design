spring.application.name=Service-Request-Quotation-Service
server.port=${SERVER_PORT:8083}

# Datasource (PostgreSQL - own isolated DB for this service)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/service_request_quotation_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# JWT - must use the same secret as Auth-Security-Service so tokens issued there validate here
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24h}

# Where generated quotation PDFs are stored on disk
app.quotations.storage-dir=${QUOTATIONS_STORAGE_DIR:./quotations}
