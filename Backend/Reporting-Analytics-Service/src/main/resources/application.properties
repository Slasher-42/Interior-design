spring.application.name=Reporting-Analytics-Service
server.port=${SERVER_PORT:8088}

# Datasource (PostgreSQL - own isolated, read-optimized DB for this service)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/reporting_analytics_db}
spring.datasource.username=postgres
spring.datasource.password=Novemba@42

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Kafka - pure consumer, this service never publishes events of its own (Redpanda Cloud)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:d8vr583l9b9vq71tb8gg.any.eu-central-1.mpx.prd.cloud.redpanda.com:9092}
spring.kafka.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="slasher" password="TT4242@mtskr";
spring.kafka.consumer.group-id=reporting-analytics-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# JWT - must use the same secret as Auth-Security-Service so tokens issued there validate here
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24h}

# User & Client Service - client segmentation summary is pulled live via REST, not via Kafka
app.services.user-client-service.base-url=${USER_CLIENT_SERVICE_BASE_URL:http://localhost:8082}

# Ratings at or below this value (out of 5) are flagged as low-satisfaction for management review
app.feedback.low-rating-threshold=${LOW_RATING_THRESHOLD:3}
