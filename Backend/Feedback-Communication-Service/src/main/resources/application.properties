spring.application.name=Feedback-Communication-Service
server.port=${SERVER_PORT:8087}

# Datasource (PostgreSQL - own isolated DB for this service)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/feedback_communication_db}
spring.datasource.username=postgres
spring.datasource.password=Novemba@42

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Kafka - this service is the single consumer for almost every event published platform-wide (Redpanda Cloud)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:d8vr583l9b9vq71tb8gg.any.eu-central-1.mpx.prd.cloud.redpanda.com:9092}
spring.kafka.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="slasher" password="TT4242@mtskr";
spring.kafka.consumer.group-id=feedback-communication-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# JWT - must use the same secret as Auth-Security-Service so tokens issued there validate here
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLWRldi1vbmx5LXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24h}

# Gmail SMTP - host/port default to Gmail since they aren't secret; username/password have no
# default and must be supplied via MAIL_USERNAME / MAIL_PASSWORD env vars so the real Gmail app
# password is never committed to this tracked file.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Real SMTP dispatch is off by default - every "email" is always persisted to the email log,
# and actually sent via JavaMailSender only when this is enabled with real spring.mail.* settings
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@idsms.local}

# Link base used when composing verification/notification emails
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# Ratings at or below this value (out of 5) trigger a low-satisfaction alert to management
app.feedback.low-rating-threshold=${LOW_RATING_THRESHOLD:3}
